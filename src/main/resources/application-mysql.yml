# MySQL Database Configuration
# Copy this to application-prod.yml and uncomment when using MySQL

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/rag_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: rag_user
    password: your_secure_password

  jpa:
    hibernate:
      ddl-auto: update  # Create/update tables automatically
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# H2 console disabled in production
  h2:
    console:
      enabled: false

# Connection pool settings (HikariCP)
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

# MySQL specific settings
mysql:
  init:
    mode: always  # Run schema.sql if exists
    schema-locations: classpath:schema.sql
    data-locations: classpath:data.sql
