spring:
  application:
    name: enterprise-rag-system
  
  # Database Configuration (MySQL)
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:rag_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:rag_user}
    password: ${DB_PASSWORD:rag_password}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}
  
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  # H2 Console (disabled when using MySQL)
  h2:
    console:
      enabled: false
  
  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:3000}ms
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_TOTAL:8}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
          min-idle: ${REDIS_POOL_MIN_IDLE:0}
  
  # Jackson JSON Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

# Milvus Configuration (v2.5+)
milvus:
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_PORT:19530}
  database: ${MILVUS_DATABASE:default}
  username: ${MILVUS_USERNAME:}
  password: ${MILVUS_PASSWORD:}
  timeout: ${MILVUS_TIMEOUT:5000}
  embedding-dimension: ${MILVUS_EMBEDDING_DIMENSION:${EMBEDDING_DIMENSION:1536}}
  collection-name: ${MILVUS_COLLECTION_NAME:knowledge_base}

# Hybrid Search Configuration (RRF)
hybrid-search:
  dense-top-k: ${HYBRID_SEARCH_DENSE_TOP_K:100}
  sparse-top-k: ${HYBRID_SEARCH_SPARSE_TOP_K:100}
  rrf-k: ${HYBRID_SEARCH_RRF_K:60}
  final-top-k: ${HYBRID_SEARCH_FINAL_TOP_K:10}

# LLM Configuration
llm:
  provider: ${LLM_PROVIDER:openai}
  model: ${LLM_MODEL:gpt-4o-mini}
  api-key: ${LLM_API_KEY:}
  base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
  max-tokens: ${LLM_MAX_TOKENS:4096}
  temperature: ${LLM_TEMPERATURE:0.7}

# Embedding Configuration
embedding:
  model: ${EMBEDDING_MODEL:text-embedding-3-small}
  api-key: ${EMBEDDING_API_KEY:${LLM_API_KEY:}}
  base-url: ${EMBEDDING_BASE_URL:https://api.openai.com/v1}
  dimension: ${EMBEDDING_DIMENSION:1536}

# Multi-tenant Configuration
tenant:
  default-isolation-level: ${TENANT_DEFAULT_ISOLATION_LEVEL:METADATA}
  enable-partition-isolation: ${TENANT_ENABLE_PARTITION_ISOLATION:true}
  enable-collection-isolation: ${TENANT_ENABLE_COLLECTION_ISOLATION:false}

# Memory Configuration  
memory:
  session:
    max-messages: ${MEMORY_SESSION_MAX_MESSAGES:20}
    ttl-minutes: ${MEMORY_SESSION_TTL_MINUTES:30}
  episodic:
    top-k: ${MEMORY_EPISODIC_TOP_K:5}
    importance-threshold: ${MEMORY_EPISODIC_IMPORTANCE_THRESHOLD:0.3}
  profile:
    update-frequency: ${MEMORY_PROFILE_UPDATE_FREQUENCY:5}

# Text Splitter Configuration
splitter:
  chunk-size: ${SPLITTER_CHUNK_SIZE:500}
  overlap-tokens: ${SPLITTER_OVERLAP_TOKENS:100}
  min-chunk-size: ${SPLITTER_MIN_CHUNK_SIZE:50}
  encoding: ${TOKEN_ENCODING:cl100k_base}

# Server Configuration
server:
  port: ${SERVER_PORT:5000}
  servlet:
    context-path: /

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}

# Security Configuration
security:
  jwt:
    secret: ${JWT_SECRET:default_secret_change_in_production}
    expiration: ${JWT_EXPIRATION:86400000}
  admin-api-key: ${ADMIN_API_KEY:}

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.enterprise.rag: ${LOG_LEVEL_APP:DEBUG}
    io.milvus: ${LOG_LEVEL_MILVUS:INFO}
