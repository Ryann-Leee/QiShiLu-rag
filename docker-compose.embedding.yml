# Qwen3-Embedding-0.6B CPU 版本
# 用于没有 GPU 的机器

version: '3.8'

services:
  # Qwen3-Embedding 本地服务 (CPU 版本)
  embedding:
    build:
      context: ./embedding_service
      dockerfile: Dockerfile.cpu
    container_name: qwen-embedding-cpu
    hostname: qwen-embedding-cpu
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - ./models:/app/models
      - huggingface_cache:/root/.cache/huggingface
    environment:
      - HF_ENDPOINT=https://hf-mirror.com
      - PYTHONUNBUFFERED=1
    networks:
      - milvus-network

networks:
  milvus-network:
    driver: bridge

volumes:
  huggingface_cache:
